{% extends "main/bp.html" %}
{% load static %}
{% block link_style%} <link rel="stylesheet" href="{% static 'main/catalog_control__edit.css'%}"/> {% endblock%}

{% block title %}
Редактировать статус
{% endblock %}
    
{% block content%}
<form method="POST" class='form'>
        <h2 class="form__title">Редактировать статус</h2>
        {% csrf_token %}
        {{ form.name }}

            <button type="submit">Сохранить</button>
            <a href="{% url 'catalog_control' %}">Назад</a>
        </div>
    </form>
{% endblock%}
